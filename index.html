<script>
/* ===== АДМИН ===== */
const ADMINS = [
  {
    login: "robertoADMN",
    pass: "Chenel15223@"
  }
];

let isAdmin = false;

/* ===== ДАННЫЕ ===== */
let laws = {
  "ПГО": [],
  "ПОиП": [],
  "ПКО": []
};

/* LOAD */
function loadData(){
  const saved = localStorage.getItem("lawsData");
  if(saved){
    laws = JSON.parse(saved);
  }
}
loadData();

/* SAVE */
function saveData(){
  localStorage.setItem("lawsData", JSON.stringify(laws));
}

/* ===== LOGIN ===== */
function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  const found = ADMINS.find(a => a.login === email);

  if(!found){
    alert("Неверный логин");
    return;
  }

  if(found.pass === pass){
    isAdmin = true;
    closeLogin();
    updateUI();
    render();
  } else {
    alert("Неверный пароль");
  }
}

function logout(){
  isAdmin = false;
  updateUI();
  render();
}

/* ===== UI ===== */
function updateUI(){
  document.getElementById("addBtn").classList.toggle("hidden", !isAdmin);
  document.getElementById("logoutBtn").classList.toggle("hidden", !isAdmin);
  document.getElementById("loginBtn").classList.toggle("hidden", isAdmin);
}

/* ===== MODAL ===== */
function openLogin(){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("mainContent").classList.add("blur");
}

function closeLogin(){
  document.getElementById("modal").style.display = "none";
  document.getElementById("mainContent").classList.remove("blur");
}

/* ===== ADD ===== */
function addLaw(){
  if(!isAdmin) return;

  let c = prompt("1-ПГО 2-ПОиП 3-ПКО");
  let code = c==="1"?"ПГО":c==="2"?"ПОиП":c==="3"?"ПКО":null;

  let title = prompt("Название");
  let text = prompt("Текст");

  if(!code || !title || !text) return;

  laws[code].push({
    id: Date.now().toString(),
    title,
    text,
    favorite:false
  });

  saveData();
  render();
}

/* ===== DELETE ===== */
function deleteLaw(code,id){
  if(!isAdmin) return;

  laws[code] = laws[code].filter(l => l.id !== id);
  saveData();
  render();
}

/* ===== FAVORITE ===== */
function toggleFavorite(code,id){
  laws[code] = laws[code].map(l => {
    if(l.id === id){
      l.favorite = !l.favorite;
    }
    return l;
  });

  saveData();
  render();
}

/* ===== RENDER ===== */
function render(){
  let s = document.getElementById("search").value.toLowerCase();

  ["ПГО","ПОиП","ПКО"].forEach(code=>{
    let c = document.getElementById(code);
    c.innerHTML = "";

    laws[code]
      .filter(l =>
        l.title.toLowerCase().includes(s) ||
        l.text.toLowerCase().includes(s)
      )
      .forEach(law=>{
        c.innerHTML += `
          <div class="card">

            ${isAdmin ? `<div class="delete" onclick="deleteLaw('${code}','${law.id}')">✖</div>` : ""}

            <div class="heart" onclick="toggleFavorite('${code}','${law.id}')">
              ${law.favorite ? "❤️" : "🤍"}
            </div>

            <div class="card-title">${law.title}</div>
            <div>${law.text}</div>

          </div>
        `;
      });
  });
}

/* expose */
window.login = login;
window.logout = logout;
window.addLaw = addLaw;
window.deleteLaw = deleteLaw;
window.toggleFavorite = toggleFavorite;
window.render = render;
window.openLogin = openLogin;
window.closeLogin = closeLogin;

/* START */
updateUI();
render();
</script>
